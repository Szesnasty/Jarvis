name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend — build & test
  # ─────────────────────────────────────────────
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Prepare test workspace
        run: mkdir -p /tmp/jarvis-ci/memory /tmp/jarvis-ci/app/sessions /tmp/jarvis-ci/graph /tmp/jarvis-ci/agents

      - name: Run tests
        env:
          JARVIS_DISABLE_EMBEDDINGS: '1'
          JARVIS_WORKSPACE_PATH: /tmp/jarvis-ci
          ANTHROPIC_API_KEY: sk-ant-dummy-ci-key
        run: pytest --tb=short -q

  # ─────────────────────────────────────────────
  # Frontend — build & test
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — build + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (nuxt build)
        run: npm run build

      - name: Run tests (vitest)
        run: npm test

  # ─────────────────────────────────────────────
  # Release Please — Google-style versioning
  # Runs only on push to main, after CI passes
  # ─────────────────────────────────────────────
  release:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

