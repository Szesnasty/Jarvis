name: Dependency Audit

# Scans Python + npm dependencies for known CVEs. No auto-bumps, no PRs.
# Fails the build only on HIGH / CRITICAL findings so low-severity noise in
# deep transitive deps doesn't block merges.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — picks up newly published advisories against the
    # current pinned dependencies without requiring a code change.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Backend — OSV Scanner against resolved lock
  # ─────────────────────────────────────────────
  pip-audit:
    name: Backend — pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements.txt
            backend/overrides.txt

      - name: Resolve dependency lock (with overrides)
        # Compile the full runtime dependency closure with the
        # python-dotenv 1.2.2 override applied (fixes CVE-2026-28684 from
        # litellm's transitive ==1.0.1 pin). The lock is flat and fully
        # pinned — pip itself is excluded because it is a build tool, not
        # a runtime dependency of the app.
        run: uv pip compile --no-annotate --override overrides.txt requirements.txt -o jarvis-lock.txt

      - name: Scan for vulnerabilities (OSV Scanner)
        # OSV Scanner queries the OSV database directly by package name +
        # version — it does NOT invoke pip's resolver, so it has no issue
        # with the uv-overridden lock. This correctly excludes pip (not in
        # the lock) while scanning every runtime dep for known CVEs.
        # Any finding causes a non-zero exit → build fails. No allowlists.
        uses: google/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --lockfile=requirements.txt:backend/jarvis-lock.txt

  # ─────────────────────────────────────────────
  # Frontend — npm audit against package-lock.json
  # ─────────────────────────────────────────────
  npm-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit (fail on HIGH / CRITICAL)
        # --audit-level=high: exit non-zero only for high/critical findings.
        # --omit=dev: ignore devDependencies — they don't ship to users.
        run: npm audit --audit-level=high --omit=dev
