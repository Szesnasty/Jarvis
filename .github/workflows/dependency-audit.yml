name: Dependency Audit

# Scans Python + npm dependencies for known CVEs. No auto-bumps, no PRs.
# Fails the build only on HIGH / CRITICAL findings so low-severity noise in
# deep transitive deps doesn't block merges.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — picks up newly published advisories against the
    # current pinned dependencies without requiring a code change.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Backend — pip-audit against requirements.txt
  # ─────────────────────────────────────────────
  pip-audit:
    name: Backend — pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements.txt
            backend/overrides.txt

      - name: Resolve dependency lock (with overrides)
        # Compile the *exact* set of runtime deps the app will install,
        # with the python-dotenv 1.2.2 override applied (eliminates
        # CVE-2026-28684 from litellm's transitive ==1.0.1 pin). The
        # resolved lock contains only what the app actually needs at
        # runtime — `pip` itself is intentionally NOT included, so a CVE
        # in pip (e.g. CVE-2026-3219, currently unpatched upstream) does
        # not block the build. Pip is a build-time tool that runs only in
        # trusted CI/install environments and never in the deployed app.
        run: uv pip compile --override overrides.txt requirements.txt -o /tmp/jarvis-lock.txt

      - name: Install pip-audit
        run: uv pip install --system pip-audit

      - name: Run pip-audit (fail on ANY runtime vulnerability)
        # Audits the resolved runtime lock file. Strict mode: any known CVE
        # in the app's runtime dependency tree fails the build. No
        # --ignore-vuln allowlist — if a finding appears, fix it (bump,
        # override, or remove the dep).
        run: pip-audit --requirement /tmp/jarvis-lock.txt --vulnerability-service osv --desc --strict

  # ─────────────────────────────────────────────
  # Frontend — npm audit against package-lock.json
  # ─────────────────────────────────────────────
  npm-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit (fail on HIGH / CRITICAL)
        # --audit-level=high: exit non-zero only for high/critical findings.
        # --omit=dev: ignore devDependencies — they don't ship to users.
        run: npm audit --audit-level=high --omit=dev
